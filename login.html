<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Login - Shop</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
    background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
 .login-card {
    background: white;
    width: 100%;
    max-width: 420px;
    border-radius: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    padding: 35px 28px;
    position: relative;
  }
 .brand {
    text-align: center;
    margin-bottom: 30px;
  }
 .brand h1 {
    color: #ff5722;
    font-size: 26px;
    margin-bottom: 6px;
  }
 .brand p {
    color: #777;
    font-size: 13px;
  }

  /* Avatar */
 .avatar-section {
    text-align: center;
    margin-bottom: 25px;
  }
  #avatarPreview {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid #ff5722;
    background: #f5f5f5;
    margin-bottom: 10px;
  }
 .upload-label {
    display: inline-block;
    padding: 7px 14px;
    background: #fff3e0;
    color: #ff5722;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    font-weight: 500;
  }
 .upload-label:hover { background: #ffe0b2; }
  #avatarUpload { display: none; }

  /* Form */
 .form-group {
    margin-bottom: 18px;
  }
 .form-group label {
    display: block;
    font-size: 14px;
    color: #333;
    margin-bottom: 6px;
    font-weight: 500;
  }
 .required::after {
    content: " *";
    color: #e53935;
  }
 .form-group input {
    width: 100%;
    padding: 13px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 15px;
    transition: border 0.2s;
  }
 .form-group input:focus {
    border-color: #ff5722;
    outline: none;
    box-shadow: 0 0 0 3px rgba(255,87,34,0.1);
  }
 .error {
    color: #e53935;
    font-size: 12px;
    margin-top: 5px;
    display: none;
  }

  /* Button */
 .btn-login {
    width: 100%;
    padding: 14px;
    background: #ff5722;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 10px;
    transition: all 0.2s;
  }
 .btn-login:hover { background: #e64a19; }
 .btn-login:active { transform: scale(0.98); }
 .btn-login:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* Contact */
 .contact-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #eee;
    text-align: center;
    font-size: 13px;
    color: #666;
    line-height: 1.7;
  }
 .contact-footer a {
    color: #ff5722;
    text-decoration: none;
    font-weight: 500;
  }
 .contact-footer a:hover { text-decoration: underline; }

  /* Success Popup */
  @keyframes scaleIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <h1>🛍️ Welcome</h1>
    <p>Login to continue shopping</p>
  </div>

  <form id="loginForm">
    <!-- Profile Picture -->
    <div class="avatar-section">
      <img id="avatarPreview" src="https://via.placeholder.com/110x110/E0E0E0/9E9E9E?text=Photo" alt="Profile">
      <br>
      <label for="avatarUpload" class="upload-label">Upload Photo</label>
      <input type="file" id="avatarUpload" accept="image/*">
    </div>

    <!-- Name -->
    <div class="form-group">
      <label class="required">Full Name</label>
      <input type="text" id="fullName" placeholder="Enter your full name" autocomplete="name">
      <div class="error" id="nameError">Name must be at least 2 characters</div>
    </div>

    <!-- Phone -->
    <div class="form-group">
      <label class="required">Phone Number</label>
      <input type="tel" id="phoneNumber" placeholder="09031234567" maxlength="11" autocomplete="tel">
      <div class="error" id="phoneError">Enter exactly 11 digits</div>
    </div>

    <!-- Email -->
    <div class="form-group">
      <label>Email - Optional</label>
      <input type="email" id="emailAddress" placeholder="you@example.com" autocomplete="email">
    </div>

    <button type="submit" class="btn-login" id="submitBtn">Login / Continue</button>
  </form>

  <div class="contact-footer">
    Need help?<br>
    Email: <a href="mailto:amirmurtala55@gmail.com">amirmurtala55@gmail.com</a><br>
    WhatsApp only: <a href="https://wa.me/2349036912425" target="_blank">09036912425</a>
  </div>
</div>

<script>
  const form = document.getElementById('loginForm');
  const nameInput = document.getElementById('fullName');
  const phoneInput = document.getElementById('phoneNumber');
  const emailInput = document.getElementById('emailAddress');
  const avatarInput = document.getElementById('avatarUpload');
  const avatarPreview = document.getElementById('avatarPreview');
  const submitBtn = document.getElementById('submitBtn');

  // 1. Avatar preview
  avatarInput.addEventListener('change', function() {
    const file = this.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = e => {
        avatarPreview.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }
  });

  // 2. Phone validation - numbers only, 11 digits max
  phoneInput.addEventListener('input', function() {
    this.value = this.value.replace(/\D/g, '').slice(0, 11);
    if (this.value.length === 11) {
      document.getElementById('phoneError').style.display = 'none';
    }
  });

  // 3. Hide errors while typing
  nameInput.addEventListener('input', () => {
    document.getElementById('nameError').style.display = 'none';
  });

  // 4. Show success popup function
  function showPopup(message, isLogin) {
    const icon = isLogin? '👋' : '🎉';
    const title = isLogin? 'Welcome Back!' : 'Account Created!';

    document.body.insertAdjacentHTML('beforeend', `
      <div id="successPopup" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:9999">
        <div style="background:white;padding:40px;border-radius:20px;text-align:center;max-width:350px;animation:scaleIn 0.3s">
          <div style="font-size:60px;margin-bottom:15px">${icon}</div>
          <h2 style="color:#16a34a;margin-bottom:10px">${title}</h2>
          <p style="color:#64748b;margin-bottom:15px">${message}</p>
          <p style="font-size:13px;color:#999">Redirecting to shop...</p>
        </div>
      </div>
    `);

    setTimeout(() => {
      document.getElementById('successPopup')?.remove();
      window.location.href = 'user_products.html';
    }, 2000);
  }

  // 5. Form submit - checks phone on server
  form.addEventListener('submit', async function(e) {
    e.preventDefault();

    const name = nameInput.value.trim();
    const phone = phoneInput.value.trim();
    const email = emailInput.value.trim();
    const avatar = avatarPreview.src;

    let valid = true;

    if (name.length < 2) {
      document.getElementById('nameError').style.display = 'block';
      valid = false;
    }

    if (phone.length!== 11) {
      document.getElementById('phoneError').style.display = 'block';
      valid = false;
    }

    if (!valid) return;

    submitBtn.disabled = true;
    submitBtn.textContent = 'Checking...';

    try {
      const res = await fetch('/api/user/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ name, phone, email, avatar })
      });

      const data = await res.json();

      if (data.error) {
        alert('Error: ' + data.error);
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login / Continue';
        return;
      }

      // Save user to localStorage
      localStorage.setItem('shop_user', JSON.stringify(data.user));

      if (data.exists) {
        // Phone exists - login
        showPopup(`Phone already registered. Logging you in, ${data.user.name.split(' ')[0]}`, true);
      } else {
        // New account created
        showPopup(`Account created successfully, ${name.split(' ')[0]}!`, false);
      }

    } catch (err) {
      alert('Network error. Check internet and try again.');
      console.error(err);
      submitBtn.disabled = false;
      submitBtn.textContent = 'Login / Continue';
    }
  });

  // 6. Auto-fill if user already logged in before
  window.addEventListener('DOMContentLoaded', () => {
    const saved = localStorage.getItem('shop_user');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        nameInput.value = data.name || '';
        phoneInput.value = data.phone || '';
        emailInput.value = data.email || '';
        if (data.avatar && data.avatar.startsWith('data:')) {
          avatarPreview.src = data.avatar;
        }
      } catch(e) {}
    }
  });
</script>

</body>
</html>
